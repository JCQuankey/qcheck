# Example: review AI-generated quantum code in CI with qcheck.
# Copy this into .github/workflows/qcheck.yml in your own repository.
# This file is an EXAMPLE only - it does not run in the qcheck repo.
name: qcheck
on: [pull_request, push]
permissions:
  contents: read
jobs:
  qcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JCQuankey/qcheck@v0.10.0
        with:
          # Review the whole repo; or a folder, e.g. "circuits/".
          paths: "."
          # For paths containing spaces, put one path per line instead:
          #   paths: |
          #     my circuit.py
          #     openqasm sample.qasm
      # The step fails the job if qcheck finds errors (exit 1) or unsafe code (exit 2).
