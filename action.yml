name: "qcheck"
description: "Review AI-generated Qiskit and OpenQASM code with qcheck (static checks, no execution)."
branding:
  icon: "check-circle"
  color: "blue"
inputs:
  paths:
    description: "Files or directories to review. Space-separated for multiple paths; or one path per line (which allows paths with spaces). Default: the whole repo."
    required: false
    default: "."
  format:
    description: "Output format: human (default) or sarif."
    required: false
    default: "human"
  output:
    description: "Write output to this file (used with format: sarif, e.g. qcheck.sarif). A path with spaces is supported."
    required: false
    default: ""
  args:
    description: "Extra arguments for `qcheck verify` (e.g. --json)."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install qcheck (from this action, no runtime deps)
      shell: bash
      run: python -m pip install --quiet "${{ github.action_path }}"
    - name: Review quantum code
      shell: bash
      # Inputs are passed via env (never inlined into the shell) to avoid
      # injection, and the command is assembled as an array.
      #   paths: space-separated for multiple paths (backward compatible). If it
      #          contains newlines, each non-empty line is one path - which lets
      #          a single path contain spaces.
      #   output: a single value, quoted (an output path with spaces works).
      #   args: space-separated extra arguments.
      env:
        QC_PATHS: ${{ inputs.paths }}
        QC_FORMAT: ${{ inputs.format }}
        QC_OUTPUT: ${{ inputs.output }}
        QC_ARGS: ${{ inputs.args }}
      run: |
        cmd=(qcheck verify)
        if [[ "$QC_PATHS" == *$'\n'* ]]; then
          while IFS= read -r line; do
            [[ "$line" =~ [^[:space:]] ]] && cmd+=("$line")
          done <<< "$QC_PATHS"
        else
          read -r -a _paths <<< "$QC_PATHS"; cmd+=("${_paths[@]}")
        fi
        [ -n "$QC_FORMAT" ] && cmd+=(--format "$QC_FORMAT")
        [ -n "$QC_OUTPUT" ] && cmd+=(--output "$QC_OUTPUT")
        if [ -n "$QC_ARGS" ]; then read -r -a _extra <<< "$QC_ARGS"; cmd+=("${_extra[@]}"); fi
        "${cmd[@]}"
