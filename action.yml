name: "qcheck"
description: "Review AI-generated Qiskit and OpenQASM code with qcheck (static checks, no execution)."
branding:
  icon: "check-circle"
  color: "blue"
inputs:
  paths:
    description: "Files or directories to review (space-separated). Default: the whole repo."
    required: false
    default: "."
  args:
    description: "Extra arguments for `qcheck verify` (e.g. --json)."
    required: false
    default: ""
runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install qcheck (from this action, no runtime deps)
      shell: bash
      run: python -m pip install --quiet "${{ github.action_path }}"
    - name: Review quantum code
      shell: bash
      # Inputs are passed via env (never inlined into the shell) to avoid injection.
      env:
        QC_PATHS: ${{ inputs.paths }}
        QC_ARGS: ${{ inputs.args }}
      run: qcheck verify $QC_PATHS $QC_ARGS
